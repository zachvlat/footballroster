<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football Roster Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --primary: #1a5f2a;
      --secondary: #2d4a35;
      --accent: #d4af37;
      --text: #1a1a1a;
      --text-secondary: #5a5a5a;
      --border: #e0e0e0;
      --shadow: rgba(0, 0, 0, 0.1);
      --pitch-green: #2c5e2e;
      --pitch-line: #ffffff;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --surface: #1e1e1e;
      --primary: #3d8b40;
      --secondary: #5a7d5a;
      --accent: #807300;
      --text: #f0f0f0;
      --text-secondary: #a0a0a0;
      --border: #333333;
      --shadow: rgba(0, 0, 0, 0.3);
      --pitch-green: #1e3a1e;
      --pitch-line: #a0a0a0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo svg {
      width: 32px;
      height: 32px;
      stroke: var(--primary);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
    }

    .theme-toggle {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .theme-toggle:hover {
      border-color: var(--primary);
    }

    .theme-toggle svg {
      width: 22px;
      height: 22px;
      fill: var(--accent);
      stroke: none;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .header-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      padding: 6px;
    }

    .header-btn:hover {
      border-color: var(--primary);
    }

    .header-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--text);
    }

    #importFileInput {
      display: none;
    }

    .container {
      display: flex;
      gap: 24px;
      padding: 20px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .search-panel {
      width: 500px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 12px 12px 12px 42px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      background: var(--surface);
      color: var(--text);
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-box svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      fill: var(--text-secondary);
    }

    .search-results {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      max-height: 300px;
      overflow-y: auto;
    }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .search-result-item:hover {
      background: var(--bg);
    }

    .search-result-item img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--bg);
    }

    .player-info {
      flex: 1;
      min-width: 0;
    }

    .player-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .position-badge {
      background: var(--primary);
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .add-custom-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .pitch-container {
      background: var(--surface);
      border-radius: 16px;
      border: 2px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pitch-title {
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pitch-title svg {
      width: 18px;
      height: 18px;
      fill: var(--accent);
    }

    .vertical-pitch {
      position: relative;
      width: 100%;
      aspect-ratio: 68/100;
      background: var(--pitch-green);
      border: 3px solid var(--pitch-line);
      border-radius: 8px;
      box-shadow: 0 8px 16px var(--shadow);
      cursor: pointer;
      overflow: visible;
    }

    .pitch-markings {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .pitch-markings svg {
      width: 100%;
      height: 100%;
      stroke: var(--pitch-line);
      stroke-width: 2;
      fill: none;
    }

    .pitch-markings svg line,
    .pitch-markings svg circle,
    .pitch-markings svg rect {
      stroke: var(--pitch-line);
    }

    .pitch-drop-zones {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      z-index: 5;
    }

    .pitch-row {
      display: flex;
      flex: 1;
      width: 100%;
    }

    .pitch-cell {
      flex: 1;
      border: 1px dashed rgba(255, 255, 255, 0.2);
      transition: background 0.2s;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pitch-cell.drag-over {
      background: rgba(212, 175, 55, 0.3);
      border: 2px solid var(--accent);
    }

    .pitch-player {
      background: var(--surface);
      border-radius: 30px;
      padding: 4px 8px 4px 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      border: 2px solid var(--primary);
      box-shadow: 0 2px 8px var(--shadow);
      cursor: grab;
      max-width: 90%;
      pointer-events: all;
      z-index: 10;
      position: relative;
    }

    .pitch-player:active {
      cursor: grabbing;
      opacity: 0.8;
    }

    .pitch-player.dragging {
      opacity: 0.4;
    }

    .pitch-player img {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg);
    }

    .pitch-player .remove-mini {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      cursor: pointer;
      margin-left: 2px;
    }

    .pitch-player .remove-mini:hover {
      background: #e74c3c;
      color: white;
    }

    .pitch-row-label {
      position: absolute;
      left: 2px;
      top: 2px;
      font-size: 0.6rem;
      color: var(--pitch-line);
      opacity: 0.7;
      z-index: 20;
      pointer-events: none;
    }

    .roster-panel {
      flex: 1;
    }

    .roster-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .roster-header h2 {
      font-size: 1.3rem;
    }

    .roster-count {
      background: var(--primary);
      color: white;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .position-groups {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .group {
      background: var(--surface);
      border-radius: 20px;
      padding: 16px 18px 18px 18px;
      border: 2px solid var(--border);
      transition: border-color 0.2s, background 0.2s;
    }

    .group.drag-over {
      border-color: var(--accent);
      background: rgba(212, 175, 55, 0.05);
    }

    .group-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .group-title h3 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--primary);
    }

    .group-badge {
      background: var(--accent);
      color: var(--text);
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
      min-height: 130px;
      transition: background 0.1s;
    }

    .player-card {
      background: var(--bg);
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 10px 6px 6px 6px;
      position: relative;
      transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: grab;
      user-select: none;
      box-shadow: 0 2px 6px var(--shadow);
    }

    .player-card:active {
      cursor: grabbing;
      opacity: 0.8;
      transform: scale(0.98);
    }

    .player-card.dragging {
      opacity: 0.4;
      transform: scale(0.95);
    }

    .player-card .remove-btn {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      font-size: 14px;
      line-height: 1;
      z-index: 10;
    }

    .player-card:hover .remove-btn {
      opacity: 1;
    }

    .player-card .remove-btn:hover {
      background: #e74c3c;
      color: white;
    }

    .player-card img {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface);
      margin-bottom: 4px;
      border: 1px solid var(--border);
      pointer-events: none;
    }

    .player-card .card-name {
      font-weight: 600;
      font-size: 0.8rem;
      text-align: center;
      line-height: 1.2;
      max-width: 100px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .card-club {
      font-size: 0.65rem;
      color: var(--text-secondary);
      max-width: 100px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
      pointer-events: none;
    }

    .empty-slot {
      border: 2px dashed var(--border);
      border-radius: 14px;
      min-height: 95px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 0.7rem;
      background: var(--surface);
    }

    .roster-full-message {
      background: var(--accent);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 30px;
      text-align: center;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: 0.2s;
      z-index: 100;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      transform: scale(0.9);
      transition: 0.2s;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal h3 {
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-cancel {
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--text);
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
    }

    .btn-save {
      background: var(--primary);
      border: none;
      color: white;
      flex: 1;
      border-radius: 8px;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .group-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      }
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .search-panel {
        width: 100%;
      }

      .search-results {
        max-height: 200px;
      }
    }
  </style>
</head>

      <div class="roster-header">
        <h2>Your Roster · drag players</h2>
        <span class="roster-count"><span id="rosterCount">0</span>/36</span>
      </div>
      <div id="rosterFullMessage" style="display:none" class="roster-full-message">
        Roster is full! Remove a player to add more.
      </div>

      <div class="position-groups" id="positionGroups">
        <div class="group" data-group="gk" id="group-gk">
          <div class="group-title">
            <h3>Goalkeepers</h3><span class="group-badge" id="gkCount">0</span>
          </div>
          <div class="group-grid" id="gkGrid"></div>
        </div>
        <div class="group" data-group="def" id="group-def">
          <div class="group-title">
            <h3>Defenders</h3><span class="group-badge" id="defCount">0</span>
          </div>
          <div class="group-grid" id="defGrid"></div>
        </div>
        <div class="group" data-group="mid" id="group-mid">
          <div class="group-title">
            <h3>Midfielders</h3><span class="group-badge" id="midCount">0</span>
          </div>
          <div class="group-grid" id="midGrid"></div>
        </div>
        <div class="group" data-group="fwd" id="group-fwd">
          <div class="group-title">
            <h3>Attackers</h3><span class="group-badge" id="fwdCount">0</span>
          </div>
          <div class="group-grid" id="fwdGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- modal: custom player -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Add Custom Player</h3>
      <form id="customPlayerForm">
        <div class="form-group"><label for="playerName">Name *</label><input type="text" id="playerName" required
            placeholder="Enter player name"></div>
        <div class="form-group"><label for="playerPosition">Position</label>
          <select id="playerPosition">
            <option value="GK">GK</option>
            <option value="CB">CB</option>
            <option value="LB">LB</option>
            <option value="RB">RB</option>
            <option value="CDM">CDM</option>
            <option value="CM">CM</option>
            <option value="CAM">CAM</option>
            <option value="LM">LM</option>
            <option value="RM">RM</option>
            <option value="LW">LW</option>
            <option value="RW">RW</option>
            <option value="ST">ST</option>
            <option value="CF">CF</option>
          </select>
        </div>
        <div class="form-group"><label for="playerRating">Rating (1-99)</label><input type="number" id="playerRating"
            min="1" max="99" value="70"></div>
        <div class="form-group"><label for="playerClub">Club</label><input type="text" id="playerClub"
            placeholder="Enter club name"></div>
        <div class="form-group"><label for="playerNationality">Nationality</label><input type="text"
            id="playerNationality" placeholder="Enter nationality"></div>
        <div class="modal-buttons"><button type="button" class="btn-cancel" id="cancelBtn">Cancel</button><button
            type="submit" class="btn-save">Add Player</button></div>
      </form>
    </div>
  </div>

  <script>
    (function () {
      // --- constants & config ---
      const MAX_ROSTER = 36;
      // Use a public CORS proxy to access Fotmob API (educational use)
      const CORS_PROXY = 'https://corsproxy.io/?';
      const FOTMOB_API = CORS_PROXY + encodeURIComponent('https://www.fotmob.com/api/data/search/suggest?hits=50&lang=en&term=');
      const FOTMOB_PLAYER_API_BASE = CORS_PROXY + encodeURIComponent('https://www.fotmob.com/api/data/playerData?id=');

      // --- state ---
      let roster = [];
      let pitchPlayers = []; // players placed on pitch { playerId, row, col }
      let searchTimeout = null;

      // --- DOM elements ---
      const searchInput = document.getElementById('searchInput');
      const searchResults = document.getElementById('searchResults');
      const rosterCountSpan = document.getElementById('rosterCount');
      const rosterFullMessage = document.getElementById('rosterFullMessage');
      const modalOverlay = document.getElementById('modalOverlay');
      const customPlayerForm = document.getElementById('customPlayerForm');
      const themeToggle = document.getElementById('themeToggle');
      const cancelBtn = document.getElementById('cancelBtn');
      const pitchDropZones = document.getElementById('pitchDropZones');

      const gkGrid = document.getElementById('gkGrid');
      const defGrid = document.getElementById('defGrid');
      const midGrid = document.getElementById('midGrid');
      const fwdGrid = document.getElementById('fwdGrid');
      const gkCountSpan = document.getElementById('gkCount');
      const defCountSpan = document.getElementById('defCount');
      const midCountSpan = document.getElementById('midCount');
      const fwdCountSpan = document.getElementById('fwdCount');

      let draggedPlayerId = null;
      let draggedFromPitch = false;

      // Initialize pitch grid (5 rows x 3 columns)
      function initPitchGrid() {
        if (!pitchDropZones) return;
        let html = '';
        for (let r = 0; r < 5; r++) {
          html += '<div class="pitch-row">';
          for (let c = 0; c < 3; c++) {
            html += `<div class="pitch-cell" data-row="${r}" data-col="${c}" data-zone="${r}-${c}"></div>`;
          }
          html += '</div>';
        }
        pitchDropZones.innerHTML = html;

        // Add drop listeners to cells
        document.querySelectorAll('.pitch-cell').forEach(cell => {
          cell.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            cell.classList.add('drag-over');
          });
          cell.addEventListener('dragleave', () => {
            cell.classList.remove('drag-over');
          });
          cell.addEventListener('drop', (e) => {
            e.preventDefault();
            cell.classList.remove('drag-over');

            const playerId = e.dataTransfer.getData('text/plain');
            if (!playerId) return;

            const row = cell.dataset.row;
            const col = cell.dataset.col;

            // Check if player exists in roster
            const playerIndex = roster.findIndex(p => p.id === playerId);
            if (playerIndex === -1) return;

            // Remove player from any existing pitch position
            pitchPlayers = pitchPlayers.filter(p => p.playerId !== playerId);

            // Add to new position
            pitchPlayers.push({
              playerId: playerId,
              row: parseInt(row),
              col: parseInt(col)
            });

            renderPitchPlayers();
            draggedPlayerId = null;
          });
        });
      }

      // Render players on pitch
      function renderPitchPlayers() {
        // Clear all cells first
        document.querySelectorAll('.pitch-cell').forEach(cell => {
          cell.innerHTML = '';
        });

        pitchPlayers.forEach(pos => {
          const cell = document.querySelector(`.pitch-cell[data-row="${pos.row}"][data-col="${pos.col}"]`);
          if (!cell) return;

          const player = roster.find(p => p.id === pos.playerId);
          if (!player) return;

          const playerEl = document.createElement('div');
          playerEl.className = 'pitch-player';
          playerEl.draggable = true;
          playerEl.dataset.playerId = player.id;
          playerEl.dataset.fromPitch = 'true';

          playerEl.innerHTML = `
            <img src="${player.imgSrc || 'https://placehold.co/50x50/EEE/31343C.png?text=⚽'}" alt="${player.name}" onerror="this.src='https://placehold.co/50x50/EEE/31343C.png?text=⚽'">
            <span>${player.name.split(' ').pop() || player.name}</span>
            <span class="remove-mini" onclick="event.stopPropagation(); window.removePlayerFromPitch('${player.id}')">✕</span>
          `;

          playerEl.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', player.id);
            e.dataTransfer.effectAllowed = 'move';
            playerEl.classList.add('dragging');
            draggedFromPitch = true;
          });

          playerEl.addEventListener('dragend', (e) => {
            playerEl.classList.remove('dragging');
            draggedFromPitch = false;
          });

          cell.appendChild(playerEl);
        });
      }

      window.removePlayerFromPitch = function (playerId) {
        pitchPlayers = pitchPlayers.filter(p => p.playerId !== playerId);
        renderPitchPlayers();
      };

      function getPlayerGroup(position) {
        if (!position) return 'mid';
        const pos = position.toUpperCase().trim();
        if (pos === 'GK') return 'gk';
        if (['CB', 'LB', 'RB', 'LCB', 'RCB', 'LWB', 'RWB', 'SW'].some(p => pos.includes(p))) return 'def';
        if (['ST', 'CF', 'LW', 'RW', 'SS', 'LF', 'RF'].some(p => pos.includes(p))) return 'fwd';
        return 'mid';
      }

      function renderRoster() {
        const total = roster.length;
        rosterCountSpan.textContent = total;
        rosterFullMessage.style.display = total >= MAX_ROSTER ? 'block' : 'none';

        const gkPlayers = roster.filter(p => getPlayerGroup(p.position) === 'gk');
        const defPlayers = roster.filter(p => getPlayerGroup(p.position) === 'def');
        const midPlayers = roster.filter(p => getPlayerGroup(p.position) === 'mid');
        const fwdPlayers = roster.filter(p => getPlayerGroup(p.position) === 'fwd');

        gkCountSpan.textContent = gkPlayers.length;
        defCountSpan.textContent = defPlayers.length;
        midCountSpan.textContent = midPlayers.length;
        fwdCountSpan.textContent = fwdPlayers.length;

        function renderGroupGrid(container, players) {
          if (!container) return;
          if (players.length === 0) {
            container.innerHTML = '<div class="empty-slot">Empty</div><div class="empty-slot">Empty</div><div class="empty-slot">Empty</div>';
            return;
          }
          let html = players.map(p => {
            return `<div class="player-card" draggable="true" data-player-id="${p.id}">
              <button class="remove-btn" onclick="window.removePlayerById('${p.id}')">✕</button>
              <img src="${p.imgSrc || 'https://placehold.co/50x50/EEE/31343C.png?text=⚽'}" alt="${p.name}" onerror="this.src='https://placehold.co/50x50/EEE/31343C.png?text=⚽'">
              <div class="card-name">${p.name}</div>
              <div class="card-club">${p.club || 'Free'}</div>
            </div>`;
          }).join('');
          const emptyNeeded = Math.max(0, 4 - players.length);
          for (let i = 0; i < emptyNeeded; i++) html += '<div class="empty-slot">Empty</div>';
          container.innerHTML = html;

          container.querySelectorAll('.player-card[draggable="true"]').forEach(card => {
            card.addEventListener('dragstart', handleDragStart);
            card.addEventListener('dragend', handleDragEnd);
          });
        }

        renderGroupGrid(gkGrid, gkPlayers);
        renderGroupGrid(defGrid, defPlayers);
        renderGroupGrid(midGrid, midPlayers);
        renderGroupGrid(fwdGrid, fwdPlayers);

        // Clean up pitch players that are no longer in roster
        pitchPlayers = pitchPlayers.filter(p => roster.some(r => r.id === p.playerId));
        renderPitchPlayers();
      }

      function handleDragStart(e) {
        const card = e.target.closest('.player-card');
        if (!card) return;
        const playerId = card.dataset.playerId;
        draggedPlayerId = playerId;
        e.dataTransfer.setData('text/plain', playerId);
        e.dataTransfer.effectAllowed = 'move';
        card.classList.add('dragging');
        draggedFromPitch = false;
      }

      function handleDragEnd(e) {
        const card = e.target.closest('.player-card');
        if (card) card.classList.remove('dragging');
        document.querySelectorAll('.group').forEach(g => g.classList.remove('drag-over'));
        document.querySelectorAll('.pitch-cell').forEach(c => c.classList.remove('drag-over'));
        draggedPlayerId = null;
      }

      function setupDropZones() {
        const groups = document.querySelectorAll('.group');
        groups.forEach(group => {
          group.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            group.classList.add('drag-over');
          });
          group.addEventListener('dragleave', () => {
            group.classList.remove('drag-over');
          });
          group.addEventListener('drop', (e) => {
            e.preventDefault();
            group.classList.remove('drag-over');
            const targetGroup = group.dataset.group;
            if (!targetGroup) return;

            const playerId = e.dataTransfer.getData('text/plain');
            if (!playerId) return;

            const playerIndex = roster.findIndex(p => p.id === playerId);
            if (playerIndex === -1) return;

            const player = roster[playerIndex];
            const currentGroup = getPlayerGroup(player.position);

            if (currentGroup === targetGroup) return;

            let newPosition = player.position;
            if (targetGroup === 'gk' && currentGroup !== 'gk') newPosition = 'GK';
            else if (targetGroup === 'def' && currentGroup !== 'def') newPosition = 'CB';
            else if (targetGroup === 'mid' && currentGroup !== 'mid') newPosition = 'CM';
            else if (targetGroup === 'fwd' && currentGroup !== 'fwd') newPosition = 'ST';

            roster[playerIndex] = { ...player, position: newPosition };

            saveRoster();
            renderRoster();
          });
        });
      }

      window.removePlayerById = function (id) {
        const index = roster.findIndex(p => p.id === id);
        if (index !== -1) {
          roster.splice(index, 1);
          pitchPlayers = pitchPlayers.filter(p => p.playerId !== id);
          saveRoster();
          renderRoster();
        }
      };

      function saveRoster() {
        localStorage.setItem('footballRoster', JSON.stringify(roster));
        localStorage.setItem('pitchPlayers', JSON.stringify(pitchPlayers));
      }

      function loadRoster() {
        const saved = localStorage.getItem('footballRoster');
        if (saved) { try { roster = JSON.parse(saved); } catch { roster = []; } }
        else roster = [];

        const savedPitch = localStorage.getItem('pitchPlayers');
        if (savedPitch) { try { pitchPlayers = JSON.parse(savedPitch); } catch { pitchPlayers = []; } }
        else pitchPlayers = [];
      }

      function loadTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
      }
      function updateThemeIcon(theme) {
        const sun = document.querySelector('.sun-icon');
        const moon = document.querySelector('.moon-icon');
        if (theme === 'dark') { sun.style.display = 'none'; moon.style.display = 'block'; }
        else { sun.style.display = 'block'; moon.style.display = 'none'; }
      }
      themeToggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeIcon(next);
      });

      const exportBtn = document.getElementById('exportBtn');
      const importBtn = document.getElementById('importBtn');
      const importFileInput = document.getElementById('importFileInput');

      exportBtn.addEventListener('click', () => {
        const data = JSON.stringify({ roster, pitchPlayers }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'football-roster.json';
        a.click();
        URL.revokeObjectURL(url);
      });

      importBtn.addEventListener('click', () => importFileInput.click());
      importFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const imported = JSON.parse(event.target.result);
            if (Array.isArray(imported)) {
              roster = imported;
              pitchPlayers = [];
            } else if (imported.roster) {
              roster = imported.roster;
              pitchPlayers = imported.pitchPlayers || [];
            }
            saveRoster();
            renderRoster();
          } catch { }
        };
        reader.readAsText(file);
        e.target.value = '';
      });

      window.openModal = function (prefill) {
        document.getElementById('playerName').value = prefill || '';
        document.getElementById('playerRating').value = 70;
        modalOverlay.classList.add('active');
      };
      function closeModal() { modalOverlay.classList.remove('active'); customPlayerForm.reset(); }
      cancelBtn.addEventListener('click', closeModal);
      modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

      customPlayerForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (roster.length >= MAX_ROSTER) { rosterFullMessage.style.display = 'block'; return; }
        const name = document.getElementById('playerName').value.trim();
        if (!name) return;
        const pos = document.getElementById('playerPosition').value;
        roster.push({
          id: 'custom-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6),
          name: name.charAt(0).toUpperCase() + name.slice(1),
          position: pos,
          rating: parseInt(document.getElementById('playerRating').value) || 70,
          club: document.getElementById('playerClub').value || 'Free Agent',
          nationality: document.getElementById('playerNationality').value || 'Unknown',
          isCustom: true
        });
        saveRoster(); renderRoster(); closeModal(); searchInput.value = ''; searchResults.innerHTML = '';
      });

      async function searchPlayers(query) {
        try {
          const url = FOTMOB_API + encodeURIComponent(query);
          const res = await fetch(url);
          if (!res.ok) throw new Error();
          const data = await res.json();
          const players = (data[0]?.suggestions || []).filter(s => s.type === 'player');
          if (players.length) renderSearchResults(players);
          else renderNoResults(query);
        } catch { searchResults.innerHTML = '<div class="search-message">Unable to search players</div>'; }
      }

      function renderSearchResults(players) {
        searchResults.innerHTML = players.map(p => {
          const safe = JSON.stringify(p).replace(/"/g, '&quot;');
          return `<div class="search-result-item" onclick="window.addPlayerFromApi(${safe})">
            <img src="https://images.fotmob.com/image_resources/playerimages/${p.id}.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 100 100\\'%3E%3Ccircle cx=\\'50\\' cy=\\'50\\' r=\\'40\\' fill=\\'%23ddd\\'/%3E%3Ctext x=\\'50\\' y=\\'55\\' text-anchor=\\'middle\\' font-size=\\'30\\'%3E⚽%3C/text%3E%3C/svg%3E'">
            <div class="player-info"><div class="player-name">${p.name}</div><div class="player-meta"><span class="position-badge">-</span><span>${p.teamName || 'Free'}</span></div></div></div>`;
        }).join('');
      }
      function renderNoResults(query) {
        searchResults.innerHTML = `<div class="search-message">No players for "${query}"</div><button class="add-custom-btn" onclick="openModal('${query}')">Add Custom Player</button>`;
      }

      window.addPlayerFromApi = async function (player) {
        if (roster.length >= MAX_ROSTER) { rosterFullMessage.style.display = 'block'; return; }
        rosterFullMessage.style.display = 'none';
        searchResults.innerHTML = '<div class="search-message">Loading player data...</div>';
        try {
          const res = await fetch(FOTMOB_PLAYER_API_BASE + player.id);
          if (!res.ok) throw new Error();
          const data = await res.json();
          let position = '-';
          if (data.positionDescription) {
            if (data.positionDescription.positions?.length) {
              const main = data.positionDescription.positions.find(p => p.isMainPosition) || data.positionDescription.positions[0];
              position = main.strPos?.label || main.strPosShort?.label || '-';
            } else if (data.positionDescription.primaryPosition) position = data.positionDescription.primaryPosition.label || '-';
          }
          let rating = 75;
          if (data.mainLeague?.stats) {
            const r = data.mainLeague.stats.find(s => s.localizedTitleId === 'rating');
            if (r) rating = Math.round(r.value);
          }
          const team = data.primaryTeam?.teamName || player.teamName || 'Free Agent';
          roster.push({
            id: 'api-' + player.id + '-' + Date.now(),
            name: data.name || player.name,
            position: position,
            rating: rating,
            club: team,
            imgSrc: `https://images.fotmob.com/image_resources/playerimages/${player.id}.png`,
            isCustom: false
          });
          saveRoster(); renderRoster(); searchInput.value = ''; searchResults.innerHTML = '';
        } catch {
          roster.push({
            id: 'api-fb-' + player.id + '-' + Date.now(),
            name: player.name,
            position: '-',
            rating: 75,
            club: player.teamName || 'Free Agent',
            imgSrc: `https://images.fotmob.com/image_resources/playerimages/${player.id}.png`,
            isCustom: false
          });
          saveRoster(); renderRoster(); searchInput.value = ''; searchResults.innerHTML = '';
        }
      };

      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const q = e.target.value.trim();
        if (q.length < 2) { searchResults.innerHTML = ''; return; }
        searchTimeout = setTimeout(() => searchPlayers(q), 300);
      });

      // Initialize
      loadTheme();
      loadRoster();
      initPitchGrid();
      renderRoster();
      setupDropZones();
    })();
  </script>
</body>

</html>
