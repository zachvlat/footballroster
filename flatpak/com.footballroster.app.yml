app-id: com.footballrosterbuilder.app
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: football-roster-builder

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --filesystem=home

modules:
  - name: football-roster-builder
    buildsystem: simple
    build-commands:
      - cp -r . /app/football-roster-builder
      - install -Dm755 football-roster-builder.sh /app/bin/football-roster-builder
    sources:
      - type: dir
        path: .
      - type: script
        dest-filename: football-roster-builder.sh
        commands:
          - exec /app/football-roster-builder/node_modules/.bin/electron /app/football-roster-builder/
